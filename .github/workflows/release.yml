name: Release

# Build per-arch plugin binaries and attach them to a GitHub Release whenever
# a `vX.Y.Z` tag is pushed.
#
# Outputs:
#   squelch_uploader-linux-amd64.so
#   squelch_uploader-linux-arm64.so
#   SHA256SUMS
#
# darwin-arm64 is intentionally not built for v0.1.0; CMake's bundled
# FindBoost is too old for Homebrew Boost 1.90 on macos-14. macOS will
# rejoin the matrix in a follow-up release once the Boost integration
# is sorted (vendoring, vcpkg, or pinning a versioned formula).
#
# Release notes come from the matching `## [X.Y.Z]` section of CHANGELOG.md.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build a release for, e.g. v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: linux-amd64
            runs-on: ubuntu-24.04
            ext: so
          - arch: linux-arm64
            runs-on: ubuntu-24.04-arm
            ext: so
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libcurl4-openssl-dev libssl-dev \
            libboost-all-dev gnuradio-dev nlohmann-json3-dev

      - name: Configure
        run: cmake -S plugin -B plugin/build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build plugin/build --parallel

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp plugin/build/squelch_uploader.${{ matrix.ext }} \
             dist/squelch_uploader-${{ matrix.arch }}.${{ matrix.ext }}

      - uses: actions/upload-artifact@v4
        with:
          name: squelch_uploader-${{ matrix.arch }}
          path: dist/squelch_uploader-${{ matrix.arch }}.${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag/version
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p dist
          find artifacts -type f -name 'squelch_uploader-*.so' \
            -exec cp {} dist/ \;
          ls -la dist
          ( cd dist && sha256sum squelch_uploader-*.so > SHA256SUMS )
          cat dist/SHA256SUMS

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          version='${{ steps.tag.outputs.version }}'
          # Pull the lines between `## [<version>]` (inclusive of header) and
          # the next `## [` heading. If nothing matches, fall back to a
          # minimal autogenerated note.
          notes_file=$(mktemp)
          awk -v ver="$version" '
            BEGIN { p = 0 }
            /^## \[/ {
              if (p) { exit }
              if (index($0, "## [" ver "]") == 1) { p = 1; print; next }
            }
            p { print }
          ' CHANGELOG.md > "$notes_file"

          if [[ ! -s "$notes_file" ]]; then
            printf '## %s\n\nSee CHANGELOG.md for details.\n' \
              "${{ steps.tag.outputs.tag }}" > "$notes_file"
          fi

          echo "file=$notes_file" >> "$GITHUB_OUTPUT"
          echo "----- release notes -----"
          cat "$notes_file"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: ${{ steps.notes.outputs.file }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          fail_on_unmatched_files: true
          files: |
            dist/squelch_uploader-linux-amd64.so
            dist/squelch_uploader-linux-arm64.so
            dist/SHA256SUMS
