name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  plugin-build:
    name: C++ plugin (cmake + gtest)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libcurl4-openssl-dev nlohmann-json3-dev \
            libgtest-dev libgmock-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSQUELCH_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  script-lint:
    name: Python script (ruff + mypy + pytest)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: script
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy --strict upload.py

      - name: Pytest
        run: pytest -q
